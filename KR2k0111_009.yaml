body:
  text: 東京夢華録卷九宋孟元老撰十月一日十月一日宰臣已下受衣著錦襖三日今則五日士庶皆出城饗墳禁中車馬出道者院及西京朝陵宗室車馬亦如寒食節有司進暖爐炭民間皆置酒作暖爐會也天寧節初十日天寧節前一月教坊集諸妓閲樂初八日樞密院率修武郎以上初十日尚書省宰執率宣教郎以上並詣相國寺罷𣪚祝聖齋筵次赴尚書省都廳賜宴宰執親王宗室百官入內上夀十二日宰執親王宗室百官入內上夀大起居搢笏舞蹈樂未作集英殿山樓上教坊樂人效百禽鳴內外肅然止聞半空和鳴若鸞鳳翔集百官以下謝坐訖宰執禁從親王宗室觀察使已上并大遼髙麗夏國使副坐於殿上諸卿少百官諸國中節使人坐兩廊軍校以下排在山樓之後皆以紅面青􅩓黑漆矮偏釘每分列環餅油餅棗塔為看盤次列果子惟大遼加之豬羊雞鵝兔連骨熟肉為看盤皆以小繩束之又生蔥韭蒜醋各一堞三五人共列漿水一桶立杓數枚教坊色長二人在殿上欄干邊皆諢裹寬紫袍金帶義欄看盞斟御酒看盞者舉其袖唱引曰綏御酒聲絶拂雙袖於欄干而止宰臣酒則曰綏酒如前教坊樂部列於山樓下綵棚中皆裹長腳幞頭隨逐部服紫緋緑三色寬衫黃義欄鍍金凹面腰帶前列拍板十串一行次一色畫面琵琶五十面次列箜篌兩座箜篌髙三尺許形如半邊朩梳黑漆鏤花金裝畫下有臺座張二十五絃一人跪而交手擘之以次髙架大鼓二面綵畫花地金龍擊鼓人背結寬袖别套黃窄袖垂結帶金裹鼓棒兩手髙舉互擊宛若流星後有羯鼓兩座如尋常番鼓子置之小卓子上兩手皆執杖擊之杖鼓應焉次列鐵石方響眀金綵畫架子雙垂流蘇次列簫笙塤箎觱篥龍笛之類兩旁對列杖鼓二百面皆長腳幞頭紫繡抹額背繫紫寬衫黃窄袖結黃義欄諸雜劇色皆諢裹各服本色紫緋緑寬衫義欄鍍金帶自殿陛對立直至樂棚每遇舞者入場則排立者義手舉左右肩動足應拍一齊羣舞謂之挼曲子挼字仍回反第一盞御酒歌板色一名唱中腔一遍訖先笙與簫笛各一管和又一遍衆樂齊舉獨聞歌者之聲宰以酒樂部起傾杯百官酒三臺舞旋多是雷中慶其餘樂人舞者諢裹寬衫唯中慶有官故展裹舞曲破攧前一遍舞者入場至歇拍續一人入場對舞數拍前舞者退獨後舞者終其曲謂之舞末第二盞御酒歌板色唱如前宰以酒慢曲子百官酒三臺舞如前第三盞左右軍百戲入場一時呈拽所謂左右軍乃軍師坊市兩廂也非諸軍之軍百戲乃上竿跳索倒立折腰弄碗踢瓶筋斗擎戴之類即不用獅豹大旗神鬼也藝人或男或女皆紅巾綵服殿前自有石鐫柱窠百戲入場旋立其戲竿凡御宴至第三盞方有下酒肉醎豉爆肉雙下駝峯角子第四盞如上儀舞畢發談子參軍色執竹竿拂子念致語口號諸雜劇色打和再作語勾合大曲舞下酒榼炙子骨頭索粉白肉胡餅第五盞御酒獨彈琵琶宰以酒獨打方響凡獨奏樂並樂人謝恩訖上殿奏之百官酒樂部起三臺舞如前畢參軍色執竹竿子作語勾小兒隊舞小兒各選年十二三者二百餘人列四行每行隊頭一名四人簇擁並小隱士帽著緋緑紫青生色花衫上領四契義欄束帶各執花枝排定先有四人裹卷腳幞頭紫衫者擎一綵殿子內金貼字牌擂鼓而進謂之隊名牌上有一聨謂如九韶翔綵鳳八佾舞青鸞之句樂部舉樂小兒舞步進前直叩殿陛參軍色作語問小兒班首近前進口號雜劇人皆打和畢樂作羣舞合唱且舞且唱又唱破子畢小兒班首入進致語勾雜劇入場一場兩假是時教坊雜劇色鱉膨劉喬侯伯朝孟景初王顔喜而下皆使副也內殿雜戲為有使人預宴不敢深作諧謔惟用羣隊裝其似像市語謂之拽串雜戲畢參軍色作語放小兒隊又羣舞應天長曲子出場下酒羣仙炙天花餅太平畢羅乾飯縷肉羔蓮花肉餅駕興歇座百官退出殿門幕次須臾追班起居再坐第六盞御酒笙起慢曲子宰以酒慢曲子百官酒三臺舞左右軍築毬殿前旋立毬門約髙三丈許雜綵結絡留門一尺許左軍毬頭蘇述長腳幞頭紅錦襖餘皆卷腳幞頭亦紅錦襖十餘人右軍毬頭孟宣并十餘人皆青錦衣樂部哨笛杖鼓斷送左軍先以毬團轉衆小築數遭有一對次毬頭小築數下待其端正即供毬與毬頭打大膁過毬門右軍承得毬復團轉衆小築數遭次毬頭亦依前供毬與毬頭以大膁打過或有即便復過者勝勝者賜以銀碗錦綵拜舞謝恩以賜錦共披而拜也不勝者毬頭喫鞭仍加抹搶下酒假黿魚密浮酥捺花第七盞御酒慢曲子宰以酒皆慢曲子百官酒三臺舞訖參軍色作語勾女童隊入場女童皆選兩軍妙齡容艷過人者四百餘人或戴花冠或仙人髻鴉霞之服或卷曲花腳幞頭四契紅黃生色銷金錦繡之衣結束不常莫不一時新粧曲盡其妙杖子頭四人皆裹曲腳向後指天幞頭簪花紅黃寬袖衫義欄執銀裹頭杖子皆都城角者當時乃陳奴哥爼姐哥李伴奴雙奴餘不足數亦每名四人簇擁多作仙童丫髻仙裳執花舞步進前成列或舞採蓮則殿前皆列蓮花檻曲亦進隊名參軍色作語問隊杖子頭者進口號且舞且唱樂部斷送採蓮訖曲終復羣舞唱中腔畢女童進致語勾雜戲入場亦一場兩假訖參軍色作語放女童隊又羣唱曲子舞步出場比之小兒節次增多矣下酒排炊羊胡餅炙金腸第八盞御酒歌板色一名唱踏歌宰以酒慢曲子百官酒三臺舞合曲破舞旋下酒假沙魚獨下饅頭肚羮第九盞御酒慢曲子宰以酒慢曲子百官酒三臺舞曲如前左右軍相撲下酒水飯簇飣下飯駕興御筵酒盞皆屈巵如菜碗樣而有手把子殿上純金廊下純銀食器金銀錂漆碗楪也宴退臣僚皆簪花歸私第呵引從人皆簪花並破官錢諸女童隊出右掖門少年豪俊爭以寶具供送飲食酒果迎接各乘駿騎而歸或花冠或作男子結束自御街馳驟競逞華麗觀者如堵省宴亦如此立冬是月立冬前五日西御園進冬菜京師地寒冬月無蔬菜上至宫禁下及民間一時收藏以充一冬食用於是車載馬駝充塞道路時物薑豉􅯴子紅絲末臟鵝梨榅桲蛤蜊螃蟹東京夢華録卷九
