body:
  text: 東亰夢華録卷七宋孟元老撰清明節清明節尋常亰師以冬至後一百五日為大寒食前一日謂之炊熟用麵造棗䭅飛燕栁條串之插於門楣謂之子推燕子女及笄者多以是日上頭寒食第三節即清明日矣凡新墳皆用此日拜掃都城人出郊禁中前半月發宫人車馬朝陵宗室南班近親亦分遣詣諸陵墳享祀從人皆紫衫白絹三角子青行纒皆係官給節日亦禁中出車馬詣奉先寺道者院祀諸宫人墳莫非金裝紺幰錦額珠簾繡扇雙遮紗籠前導士庶闐塞諸門紙馬鋪皆於當街用紙衮疊成樓閣之狀四野如市往往􅈬芳樹之下或園囿之間羅列杯盤互相勸酬都城之歌兒舞女遍滿園亭抵暮而歸各㩦棗䭅炊餅黃胖掉刀名花異果山亭戲具鴨卵雞雛謂之門外土儀轎子即以楊栁雜花裝簇頂上四垂遮映自此三日皆出城上墳但一百五日最盛節日坊市賣稠餳麥糕乳酪乳餅之類緩入都門斜楊御栁醉歸院落明月梨花諸軍禁衛各成隊伍跨馬作樂四出謂之腳其旗旌鮮明軍容雄壯人馬精鋭又别為一景也三月一日開金明池瓊林苑三月一日州西順天門外開金明池瓊林苑每日教習車駕上池儀範雖禁從士庶許縱賞御史臺有榜不得彈劾池在順天門街北周圍約九里三十步池西直徑七里許入池門內南岸西去百餘步有西北臨水殿車駕臨幸觀爭標錫宴於此往日旋以綵幄政和間用土朩工造成矣又西去數百步乃仙橋南北約數百步橋面三虹朱漆欄楯下排鴈柱中央隆起謂之駱駝虹若飛虹之狀橋盡處五殿正在池之中心四岸石甃向背大殿中坐各設御幄朱漆明金龍牀河間雲水戲龍屏風不禁遊人殿上下回廊皆關撲錢物飲食伎藝人作場勾肆羅列左右橋上兩邊用瓦盆內擲頭錢關撲錢物衣服動使遊人還往荷蓋相望橋之南立櫺星門門裏對立綵樓每爭標作樂列妓女於其上門相對街南有磚石甃砌高臺上有樓觀廣百丈許曰寶津樓前至池門闊百餘丈下瞰仙橋水殿車駕臨幸觀騎射百戲於此池之東岸臨水近墻皆垂楊兩邊皆綵棚幕次臨水假賃觀看爭標街東皆酒食店舍博易場戶藝人勾肆質庫不以幾日解下只至間池便典沒出賣北去直至池後門乃汴河西水門也其池之西岸亦無屋宇但垂楊蘸水煙草鋪堤遊人稀少多垂釣之士必於池苑所買牌子方許捕魚遊人得魚倍其價買之臨水砟膾以薦芳樽乃一時佳味也習水教罷繫小龍船於此池岸正北對五殿起大屋盛大龍船謂之奧屋車駕臨幸往往取二十日諸禁衛班直簪花披錦繡撚金線衫袍金帶勒帛之類結束競逞鮮新出內府金鎗寶裝弓劍龍鳳繡旗紅纓錦轡萬騎爭馳鐸聲震地駕幸臨水殿觀爭標錫宴駕先幸池之臨水殿錫宴羣臣殿前出水棚排立儀衛近殿水中橫列四綵舟上有諸軍百戲如大旗獅豹掉刀蠻牌神鬼雜劇之類又列兩船皆樂部又有一小船上結小綵樓下有三小門如傀儡棚正對水中樂船上參軍色進致語樂作綵棚中門開出小朩偶人小船子上有一白衣人垂釣後有小童舉掉划船遼繞數回作語樂作釣出活小魚一枚又作樂小船入棚繼有朩偶築毬舞旋之類亦各念致語唱和樂作而巳謂之水傀儡又有兩畫船上立鞦韆船尾百戲人上竿左右軍院虞候監教鼓笛相和又一人上蹴鞦韆將平架筋斗擲身入水謂之水鞦韆水戲呈畢百戲樂船並各鳴鑼鼓動樂舞旗與水傀儡船分兩壁退去有小龍船二十隻上有緋衣軍士各五十餘人各設旗鼓銅鑼船頭有一軍人校舞旗招引乃虎翼指揮兵級也又有虎頭船十隻上有一錦衣人執小旗立船頭上餘皆著青短衣長頂頭巾齊舞棹乃百姓卸在行人也又有飛魚船二隻綵畫間金最為精巧上有雜彩戲衫五十餘人間列雜色小旗緋傘左右招舞鳴小鑼鼓鐃鐸之類又有鰍魚船二隻止容一人撑划乃獨朩為之也皆進花石朱勔所進諸小船競詣奧屋牽拽大龍船出詣水殿其小龍船爭先團轉翔舞迎導於前其虎頭船以繩牽引龍舟大龍船約長三四十丈闊三四丈頭尾鱗鬛皆雕鏤金飾楻板皆退光兩邊列十閣子充閣分歇泊中設御座龍水屏風楻板到底深數尺底上密排鐵鑄大銀樣如卓面大者壓重庶不欹側也上有層樓臺觀檻曲安設御座龍頭上人舞旗左右水棚排列六槳宛若飛騰至水殿艤之一邊水殿前至仙橋預以紅旗插於水中標識地分逺近所謂小龍船列於水殿前東西相向虎頭飛魚等船布在其後如兩陳之勢須臾水殿前水棚上一軍校以紅旗招之龍船各鳴鑼鼓出陳划棹旋轉共為圓陳謂之旋羅水殿前又以旗招之其船分而為二各圓陳謂之海眼又以旗招之兩隊船相交互謂之交頭又以旗招之則諸船皆列五殿之東面對水殿排成行列則有小舟一軍校執一竿上挂以錦綵銀碗之類謂之標竿插在近殿水中又見旗招之則兩行舟鳴鼓並進捷者得標則山呼拜舞并虎頭船之類各三次爭標而止其小船復引大龍船入奧屋內矣駕幸瓊林苑駕方幸瓊林苑在順天門大街面北與金明池相對大門牙道皆古松怪柏兩傍有石榴園櫻桃園之類各有亭榭多是酒家所占苑之東南隅政和間創築華觜岡髙數丈上有橫觀層樓金碧相射下有錦石纒道寶砌池塘栁鎖虹橋花縈鳳舸其花皆素馨末莉山丹瑞香含笑射香等閩廣二浙所進南花有月池梅亭牡丹之類諸亭不可悉數駕幸寶津樓宴殿寶津樓之南有宴殿駕臨幸嬪御車馬在此尋常亦禁人出入有官監之殿之西有射殿殿之南南有橫街牙道栁徑乃都人擊毬之所西去苑西門水虎翼巷橫道之南有古桐牙道兩傍亦有小園圃臺榭南過畫橋水心有大撮焦亭子方池栁步圍繞謂之蝦蟆亭亦是酒家占尋常駕未幸習旱教於苑大門御馬立於門上門之兩壁皆髙設綵棚許士庶觀賞呈引百戲御馬上池則張黃蓋擊鞭如儀每遇大龍船出及御馬上池則遊人增倍矣駕登寶津樓諸軍呈百戲駕登寶津樓諸軍百戲呈於樓下先列鼓子十數輩一人搖雙鼓子近前進致語多唱青春三月驀山溪也唱訖鼓笛舉一紅巾者弄大旗次獅豹入場坐作進退奮迅舉止畢次一紅巾者手執兩白旗子跳躍旋風而舞謂之撲旗子及上竿打筋斗之類訖樂部舉動琴家弄令有花粧輕健軍士百餘前列旗幟各執雉尾蠻牌朩刀初成行列拜舞互變開門奪橋等陳然後列成偃月陳樂部復動蠻牌令數內兩人出陳對舞如擊刺之狀一人作奮擊之勢一人作僵仆出場凡五七對或以鎗對牌劍對牌之類忽作一聲如霹靂謂之爆仗則蠻牌者引退煙火大起有假面披髮口吐狼牙煙火如鬼神狀者上場著青帖金花短後之衣帖金皂袴跣足擕大銅鑼隨身步舞而進退謂之抱鑼繞場數遭或􅈬地放煙火之類又一聲爆仗樂部動拜新月慢曲有面塗青碌戴面貝金睛飾以豹皮錦繡看帶之類謂之硬鬼或執刀斧或執杵棒之類作腳步蘸立為驅捉視聽之狀又爆仗一聲有假面長髯展褁緑袍鞾簡如鍾馗像者傍一人以小鑼相招和舞步謂之舞判繼有二三瘦瘠以粉塗身金睛白面如髑髏狀繫錦繡圍肚看帶手執軟仗各作魁諧趨蹌舉止若排戲謂之啞雜劇又爆仗響有煙火􅈬湧出人面不相覩煙中有七人皆披髮文身著青紗短後之衣錦繡圍肚看帶內一人金花小帽執白旗餘皆頭巾執真刀互相格鬬擊刺作破面剖心之勢謂之七聖刀忽有爆仗響又後煙火出散處以青幕圍繞列數十輩皆假面異服如祠廟中神鬼塑像謂之歇帳又爆仗響卷退次有一擊小銅鑼引百餘人或巾褁或雙髻各著雜色半臂圍肚看帶以黃白粉塗其面謂之抹蹌各執朩棹刀一口成行列擊鑼者指呼各拜舞起居畢喝喊變陳子數次成一字陳兩兩出陳格鬬作奪刀擊刺之態百端訖一人棄刀在地􅈬地擲身背著地有聲謂之扳落如是數十對訖復有一裝田舍兒者入場念誦言語訖有一裝村婦者入場與村夫相值各持棒杖互相擊觸如相歐態其村夫者以杖背村婦出場畢後部樂作諸軍繳隊雜劇一假繼而露臺弟子雜劇一假是時弟子蕭住兒丁都賽薛子大薛子小楊總惜崔上壽之輩後來者不足數合曲舞旋訖諸班直常入祗候子弟所呈馬騎先一人空手出馬謂之引馬次一人磨旗出馬謂之開道旗次有馬上抱紅繡之毬擊以紅錦索擲下於地上數騎追逐射之左曰仰手射右曰合手射謂之拖繡毬又以栁枝插於地數騎以剗子箭或弓或弩射之謂之䄍栁枝又有以十餘小旗遍裝輪上而背之出馬謂之旋風旗又有執旗挺立鞍上謂之立馬或以身下馬以手攀鞍而復上謂之騙馬或用手握定鐙袴以身從後鞦來往謂之跳馬忽以身離鞍屈右腳挂馬鬃左腳在鐙左手把鬃謂之獻鞍又曰棄鬃背坐或以兩手握鐙袴以肩著鞍橋雙腳直上謂之倒立忽擲腳著地倒拖順馬而走復跳上馬謂之拖馬或留左腳著鐙右腳出鐙離鞍橫身在鞍一邊左手捉鞍右手把鬃存身直一腳順馬而走謂之飛仙膊馬又存身拳曲在鞍一邊謂之鐙裏藏身或右臂挾鞍足著地順馬而走謂之趕馬或出一鐙墜身著鞦以手向下綽地謂之綽塵或放令馬先走以身追及握馬尾而上謂之豹子馬或橫身鞍上或輪弄利刃或重物大刀雙刀百端訖有黃衣老兵謂之黃院子數輩執小繡龍旗前導宫監馬騎百餘謂之妙法院女童皆妙齡翹楚結束如男子短頂頭巾各著雜色錦繡撚金絲番假窄袍紅緑吊敦束帶莫非玉羈金勒寶鐙花韉艷色耀日香風襲人馳驟至樓前團轉數遭輕簾鼓聲馬上亦有呈驍藝者中貴人許畋押隊招呼成列鼓聲一齊擲身下馬一手執弓箭攬韁子􅈬地如男子儀拜舞山呼訖復聽鼓聲騙馬而上大抵禁庭如男子裝者便隨男子禮起居復馳驟團旋分合陳子訖分兩陳兩兩出陳左右使馬直背射弓使番鎗或草棒交馬野戰呈驍騎訖引退又作樂先設綵結小毬門於殿前有花裝男子百餘入皆褁角子向後拳曲花幞頭半著紅半著青錦襖子義欄束帶絲鞋各跨雕鞍花䪌驢子分為兩隊各有朋頭一名各執綵畫毬杖謂之小打一朋頭用杖擊弄毬子如綴毬子方墜地兩朋爭占供與朋頭左朋擊毬子過門入孟為勝右朋向前爭占不令入孟互相追逐得籌謝恩而退續有黃院子引出宫監百餘亦如小打者但加之珠翠裝飾玉帶紅靴各跨小馬謂之大打人人乘騎精熟馳驟如神雅態輕盈妖姿綽約人間但見其圖畫矣呈訖駕幸射殿射弓駕詣射殿射弓垜子前列招箭班二十餘人皆長腳幞頭紫繡抹額紫寬衫黃義襴鴈翅排立御箭去則齊聲招舞合而復開箭中的矣又一人口銜一銀碗兩肩兩手共五隻箭來則能承之射畢駕歸宴殿池苑內縱人關撲遊戲池苑內除酒家藝人占外多以綵幕繳絡鋪設珍玉竒玩匹帛動使茶酒器物關撲有以一笏撲三十笏者以至車馬地宅歌姬舞女皆約以價而撲之出九和合有名者任大頭快活三之類餘亦不數池苑所進奉魚藕果實宣賜有差後苑作進小龍船雕牙縷翠極盡精巧隨駕藝人池上作場者宣政間張藝多渾身眼宋壽香尹士安小樂器李外寧水傀儡其餘莫知其數池上飲食水飯涼水菉豆螺螄肉饒梅花酒查片杏片梅子香藥脆梅旋切魚膾青魚鹽鴨卵雜和辣菜之類池上水教罷貴家以雙纜黑漆平船紫帷帳設列家樂遊池宣政間亦有假賃大小船子許士庶遊賞其價有差駕回儀衛駕回則御褁小帽簮花乘馬前後從駕臣寮百司儀衛悉賜花大觀初乘驄馬至太和宫前忽宣小烏其馬至御前拒而不進左右曰此願封官敕賜龍驤將軍然後􅈬轡蓋小烏平日御愛之馬也莫非錦繡盈都花光滿日御香拂路廣樂喧空寶騎交馳綵棚夾路綺羅珠翠戶戶神仙畫閣紅樓家家洞府遊人士庶車馬萬數妓女舊日多乘驢宣政間惟乘馬披涼衫將蓋頭背繫冠子上少年狎客往往隨後亦跨馬輕衫小帽有三五文身惡少年控馬謂之花褪馬用短韁促馬頭刺地而行謂之鞅韁呵喝馳驟競逞駿逸遊人往往以竹竿挑挂終日關撲所得之物而歸仍有貴家士女小轎插花不垂簾幕自三月一日至四月八日閉池雖大風雨亦有遊人路無虛日矣是月季春萬花爛熳牡丹芍藥棣棠朩香種種上市賣花者以馬頭竹藍鋪排歌呌之聲清竒可聽晴簾靜院曉幕髙樓宿酒未醒好夢初覺聞之莫不新愁易感幽恨懸生最一時之佳況諸軍出郊合教陳隊東亰夢華録卷七
