body:
  text: 東京夢華錄巻十宋孟元老撰冬至十一月冬至京師最重此節雖至貧者一年之間積累假借至此日更易新衣備辦飲食享祀先祖官放關撲慶賀往来一如年節大禮預教車象遇大禮年預於兩月前教車象自宣徳門至南薫門外往来一遭車五乗以代五輅輕重毎車上置旗二口鼓一面駕以四馬挟車衛士皆紫衫帽子車前數人擊鞭象七頭前列朱旗數十面銅鑼鼙鼓十數面先擊鑼二下鼓急應三下執旗人紫衫帽子毎一象則一人裹交脚幞頭紫衫人跨其頸手執短柄銅钁尖其刃象有不馴擊之象至宣徳樓前團轉行步數遭成列使之面北而拜亦能唱喏諸戚里宗室貴族之家勾呼就私第觀㸔贈之銀綵無虚日御街遊人嬉集觀者如織賣撲土朩粉揑小象兒并紙畫看人攜歸以為獻遺車駕宿大慶殿冬至前三日駕宿大慶殿殿庭廣闊可容數萬人盡列法駕儀仗於庭不能周徧有兩樓對峙謂之鐘鼓樓上有太史局生測騐刻漏毎時刻作雞唱鳴鼓一下則一服綠者執牙牌而奏之毎刻曰某時㡬棒鼓一時則曰某時正宰執百官皆服法服其頭冠各有品從宰執親王加貂蟬籠巾九梁從官七梁餘六梁至二梁有差䑓諌増廌角也所謂梁者謂冠前額梁上排金銅葉也皆絳袍皂縁方心曲領中單環珮雲頭履鞋隨官品執笏餘執事人皆介幘緋袍亦有等差惟閤門御史臺加方心曲領爾入殿祗應人給黄方號餘黄長號飛方長號各有所至去處儀仗車輅謂信幡龍旗相風烏指南車朩輅象輅革輅金輅玉輅之類自有三禮圖可見更不縷縷排列殿門内外及御街逺近禁衛全装鐵騎數萬圍繞大内是夜内殿儀衛之外又有裹錦縁小㡌錦絡縫寛衫兵士各執銀褁頭黒漆杖子謂之喝探兵士十餘人作一隊聚首而立凡數十隊各一名喝曰是與不是衆曰是又曰是甚人衆曰殿前都指揮使髙俅更互喝呌不停或如雞呌又置警場於宣徳門外謂之武嚴兵士畫鼓二百面角稱之其角皆以綵帛如小旗脚装結其上兵士皆小㡌黄繡抹額黄繡寛衫青窄襯衫日晡時三更時各奏嚴也毎奏先鳴角角罷一軍校執一長軟藤條上繫朱拂子擂鼓者觀拂子隨其髙低以鼓聲應其髙下也駕行儀衛次日五更攝大宗伯執牌奏中嚴外辦鐵騎前導畨衮自三更時相續而行象七頭各以文錦被其身金蓮花座安其背金轡籠絡其腦錦衣人跨其頸次第髙旗大扇畫㦸長矛五色介胄跨馬之士或小㡌錦繡抹額者或黒漆圓頂幞頭者或以皮如兠鍪者或漆皮如犀斗而籠巾者或衣紅黄罨畫錦繡之服者或衣純青純皂以至鞋袴皆青黒者或褁交脚幞頭者或以錦為繩如蛇而繞繫其身者或數十人唱引持大旗而過者或執大斧者胯劒者執銳牌者持鐙棒者或持竿上懸豹尾者或持短杵者其矛㦸皆綴五色結帶銅鐸其旗扇皆畫以龍或虎或雲彩或山河又有旗髙五丈謂之次黄龍駕詣太廟青城並先到立齋宫前义竿舍索旗坐約百餘人或有交脚幞頭胯劍足靴如四直使者千百數不可名状餘諸司祗應人皆錦襖諸班直親從親事官皆帽子結帶紅錦或紅羅上紫團答戲獅子短後打甲背子執御從物御龍直皆真珠結絡短頂頭巾紫上雜色小花繡衫金束帶看帶絲鞋天武官皆頂朱漆金装笠子紅上團花背子三衙并帶御器械官皆小帽背子或紫繡戰袍跨馬前導千乗萬騎出宣德門由景靈宫太廟駕宿太廟奉神主出室駕乗玉輅冠服如圖畫間星官之服頭冠皆北珠装結頂通天冠又謂之巻雲冠服絳袍執元圭其玉輅頂皆鏤金大蓮葉攢簇四柱欄檻鏤玉盤花龍鳳駕以四馬後出旗常輅上御座惟近侍二人一從官傍立謂之執綏以備顧問挟輅衛士皆褁黒漆團頂無脚幞頭着黄生色寛衫青窄襯衫青袴繫以錦繩輅後四人擎行馬前有朝服二人執笏面輅倒行是夜宿太廟喝探警嚴如宿殿儀至三更車駕行事執事皆宗室宫架樂作主上在殿上東南隅西面立有一朱漆金字牌曰皇帝位然後奉神主出室亦奏中嚴外辦逐室行禮畢甲馬儀仗車輅番衮出南薫門駕詣青城齋宫駕御玉輅詣青城齋宫所謂青城舊来止以青布幕為之畫砌甃之文旋結城闕殿宇宣政間悉用土朩盖造矣鐵騎圍齋宫外諸軍有紫巾緋衣素隊約千餘羅布郊野毎隊軍樂一火行宫廵檢部領甲馬来往廵邏至夜嚴警喝探如前駕詣郊壇行禮三更駕詣郊壇行禮有三重壝墻駕出青城南行曲尺西去約一里許乃壇也入外壝東門至第二壝裏面南設一大幕次謂之大次更換祭服平天冠二十四旒青衮龍服中單朱舄純玉佩二中貴扶侍行至壇前壇下又有一小幕殿謂之小次内有御座䑓髙三層七十二級壇面方圓三丈許有四踏道正南曰午階東曰卯階西曰酉階北曰子階壇上設二黄褥位北面南曰昊天上帝東南面曰太祖皇帝惟兩矮案上設禮料有登歌道士十餘人列鐘磬二架餘歌色及琴瑟之類三五執事人而已壇前設宫架樂前列編鐘玉磬其架有如常樂方響増其髙大編鐘形稍楄上下兩層掛之架兩角綴以流蘇玉磬状如曲尺繫其曲尖䖏亦架之上下兩層掛之次列數架大鼓或三或五用朩穿貫立扵架座上又有大鐘曰景鐘曰節鼓有琴而長者如筝而大者截竹如簫管兩頭存節而横吹者有土燒成如圓彈而開竅者如笙而大者如簫而増其管者有歌者其聲清亮非鄭衛之比宫架前立兩竿樂工皆褁介幘如籠巾緋寛衫勒帛二舞者頂紫色冠上有横板皂服朱裙履樂作初則文舞皆手執一紫囊盛一笛管結帶武舞一手執短矟一手執小牌比文舞加數人擊銅鐃響環又擊如銅竈突者又兩人共擕一銅甕就地擊者舞者如擊刺如乗雲如分手皆舞容矣樂作先擊柷以朩為之如方壺畫山水之状每奏樂擊之内外共九下樂止則擊敔如伏虎􅆃上如鋸齒一曲終以破竹刮之禮直官奏請駕登壇前導官皆躬身側引至壇止惟大禮使登之先正北一位拜跪酒殿中監東向一拜進爵盞再拜興復詣正東一位纔登壇而宫架聲止則壇上樂作降壇則宫架樂復作武舞上復歸小次亞獻終獻上亦如前儀當時燕越王為亞終獻也第二次登壇樂作如初跪酒畢中書舍人讀冊左右兩人舉冊而跪讀降壇復歸小次亞終獻如前再登壇進玉爵盞皇帝飲福矣亞終獻畢降壇駕小次前立則壇上禮料幣帛玉冊由酉階而下南壝門外去壇百餘歩有燎爐髙丈許諸物上䑓一人㸃唱入爐焚之壇三層囬踏道之間有十二龕祭十二宫神内壝外祭百星執事與陪祠官皆面北立班宫架樂罷鼓吹未作外内數十萬衆肅然惟聞輕風環佩之聲一贊者喝曰贊一拜皆拜禮畢郊畢駕囬駕自小次祭服還大次惟近侍椽燭二百餘條列成圍子至大次更服衮冕登大安輦輦如玉輅而大無輪四垂大帶輦官服色亦如挟路者纔升輦教坊在外壝東門排列鈞容直先奏樂一甲士舞一曲破訖教坊進口號樂作諸軍隊伍鼓吹皆動聲震天地回青城天色未曉百官常服入賀賜茶酒畢而法駕儀仗鐵騎鼓吹入南薫門御路數十里之間起居幕次貴家看棚華綵鱗砌畧無空閑去處下赦車駕登宣徳樓樓前立大旗數口内一口大者與宣徳樓齊謂之盖天旗旗立御路中心不動次一口稍小隨駕立謂之次黄龍青城太廟隨逐立之俗亦呼為盖天旗亦設宫架樂作須臾擊柝之聲旋立雞竿約髙十數丈竿尖有一大朩盤上有金雞口銜紅幡子書皇帝萬嵗字盤底有綵索四條垂下有四紅巾者争先緣索而上捷得金雞紅幡則山呼謝恩訖樓上以紅綿索通門下一綵樓上有金鳳銜赦而下至綵樓上而通事舍人得赦宣讀開封府大理寺排列罪人在樓前罪人皆緋􅒌黄布衫獄吏皆簪花鮮潔聞鼓聲疎枷放去各山呼謝恩訖樓下鈞容直樂作雜劇舞旋御龍直装神鬼斫真刀倬刀樓上百官賜茶酒諸班直呈拽馬隊六軍歸營至日晡時禮畢駕還詣諸宫行謝駕還内擇日詣景靈東西宫行恭謝之禮三日第三日畢即游幸别宫觀或大臣私第是月賣糍餻鶉方盛十二月十二月街市盡賣撒佛花韭黄生菜蘭芽勃荷胡桃澤州􅄳初八日街巷中有僧尼三五人作隊念佛以銀銅沙羅或好盆器坐一金銅或朩佛像浸以香水楊枝洒浴排門教化諸大寺作浴佛㑹并送七寶五味粥與門徒謂之臘八粥都人是日各家亦以果子雜料煑粥而食也臘日寺院送面油與門徒却入䟽教化上元燈油錢閭巷家家互相遺送是月景龍門預賞元夕於寶籙宮一方燈火繁盛二十四日交年都人至夜請僧道看經備酒果送神燒合家替代錢紙帖竈馬於竈上以酒糟塗抹竈門謂之醉司命夜於牀底㸃燈謂之照虚耗此月雖無節序而豪貴之家遇雪即開筵塑雪獅装雪燈以㑹親舊近嵗節市井皆印賣門神鍾馗桃板桃符及財門鈍驢回頭鹿馬之行帖子賣乾茄瓠馬牙菜膠牙􅄳之類以備除夜之用自入此月即有貧者三教人為一火装婦人神鬼敲鑼擊鼓廵門乞錢俗呼為打夜胡亦驅􅑂之道也除夕至除日禁中皇大儺儀並用皇城親事官諸班直戴假面繡畫色衣執金鎗龍旗教坊使孟景初身品魁偉貫金副金鍜銅甲装将軍用鎮殿将軍二人亦介胄装門神教坊南河炭醜惡魁肥装判官又装鍾馗小妹土地竈神之類共千餘人自禁中驅祟出南薫門外轉龍彎謂之埋祟而罷是夜禁中爆竹山呼聲聞于外士庶之家圍爐團坐逹旦不寐謂之守嵗凡大禮與禁中節次但嘗見習按又不知果為如何不無脫畧或改而正之則幸甚孟元老識東京夢華錄巻十
