body:
  text: 東亰夢華録巻四宋孟元老撰軍頭司軍頭司毎旬休按閲内等子相撲手劒捧手格闘諸軍營殿前指揮使直在禁中有左右班内殿直散貟散都頭散直散指揮御龍左右直係打御從物御龍骨朶子直弓箭直弩直習馭直騎御馬鈞容直招箭班金鎗班銀鎗班殿侍諸軍東西五班常入祗候毎日教閲野戰毎遇諸路解到武藝人對御格鬭天武捧日龍衛神衛各二十指揮謂之上四軍不出戍驍騎雲騎拱聖龍猛龍騎各午指揮殿前司歩軍司有虎翼各二十指揮虎翼水軍宣武各十五指揮神勇廣勇各十指揮飛山林子弩雄武廣固等指揮諸司則宣效六軍武肅武和街道司諸司諸軍指揮動以百數諸宫觀宅院各有清衛廂軍禁軍剰貟十指揮其餘工匠修内司八作司廣固作坊後花作坊書藝局綾錦院文繡院内酒坊法酒庫牛羊司油庫儀鸞司翰林司喝探武嚴輦官車子院皇城官親從官親事官上下宫皇城黄皁院子滌除各有指揮記省不盡皇太子納妃皇太子納妃鹵簿儀仗宴樂儀衛妃乗厭翟車車上設紫色團盖四柱維幕四垂大帶四馬駕之公主出降公主出降亦設儀仗行幕歩障水路凡親王公主出則有之皆係街道司兵級數十人各執掃具鍍金銀水桶前導酒之名曰水路用擔床數百鋪設房卧並紫衫巻脚幞頭天武官擡兒又有宫嬪數十皆真珠􅁫挿吊朶玲瓏簇羅頭面紅羅銷金袍帔乗馬雙控雙搭青盖前導謂之短鐙前後用紅羅銷金掌扇遮簇乗金銅檐子覆以剪㯶朱紅梁脊上列滲金銅鑄雲鳳花朶檐子約髙五尺許深八尺濶四尺許内容六人四維垂繡額珠黨白藤間花匡箱之外兩壁出攔檻皆縷金花裝雕朩人物神仙出隊兩竿十二人竿前後皆設緑絲絛金魚勾子勾定皇后出乗輿皇太后皇后出乗者謂之輿比檐子稍增廣花様皆龍前後簷皆剪㯶儀仗與駕出相似而少仍無駕頭警蹕耳士庶家與貴家婚嫁亦乗檐子只無脊上銅鳳花朶左右兩軍自有假賃所在以至從人衫㡌衣服從物俱可賃不須借措餘命婦王宫士庶通乗坐車子如檐子様製亦可容六人前後有小勾欄底下軸貫兩挾朱輪前出長轅約七八尺獨牛駕之亦可假賃雜賃若㓙事出殯自上而下㓙肆各有體例如方相車轝結絡綵帛皆有定價不須勞力尋常出街市幹事稍似路逺倦行逐坊巷橋市自有假賃鞍馬者不過百錢修整雜貨及齋僧請道儻欲修整屋宇泥補墻壁生辰忌日欲設齋僧尼道士即早辰橋市街巷口皆有朩竹匠人謂之雜貨工匠以至雜作人夫道士僧人羅立㑹聚候人請喚謂之羅齋竹朩作料亦有鋪席磚瓦泥匠隨手即就筵㑹假賃凡民間吉㓙筵㑹椅卓陳設器皿合盤酒檐動使之類自有茶酒司管賃喫食下酒自有厨司以至托盤下請書安排坐次尊前執事歌說勸酒謂之白席人總謂之四司人欲就園館亭榭寺院遊賞命客之類舉意便辦亦各有地分承攬排備自有則例亦不敢過越取錢雖百十分㕔館整肅主人只出錢而巳不用費力㑹仙酒樓如州東仁和店新門裏㑹仙樓正店常有百十分㕔館動使各各足備不尚少闕一件大抵都人風俗奢侈度量稍寛凡酒店中不問何人止兩人對坐飲酒亦須用注碗一副盤盞兩副果菜楪各五斤水菜碗三五隻即銀近百兩矣雖一人獨飲盌遂亦用銀盂之類其菓子菜蔬無非精潔若别要下酒即使人外買軟羊龜背大小骨諸色包子玉板鮓生削巴子𤓰薑之類食店大凡食店大者謂之分茶則有頭羮石髓羮白肉胡餅軟羊大小骨角䏑犒腰子石肚羮入爐羊罨生軟羊麫桐皮麫薑潑刀回刀冷淘棊子寄爐麫飯之類喫全茶饒虀頭羮更有川飯店則有挿肉麫大燠麫大小抺肉淘煎燠肉雜煎事件生熟燒飯更有南食店魚兠子桐皮熟膾麫煎魚飯又有瓠羮店門前以枋朩及花様呇結縳如山棚上掛成邊猪羊相間三二十邊近裏門面窓戸皆朱緑裝飾謂之驩門毎店各有㕔院東西廊稱呼坐次客坐則一人執筯紙遍問坐客都人侈縱百端呼索或熱或冷或温或整或絶冷精澆臕澆之類人人索喚不同行菜得之近局次立從頭唱念報與局内當局者謂之鐺頭又曰着案訖須㬰行菜者左手􅒎三椀右臂自手至肩䭾疊約二十碗散下盡合各人呼索不容差錯一有差錯坐客白之主人必加叱罵或罰工價甚者逐之吾輩入店則用一等琉璃淺稜椀謂之碧椀亦謂之造羮菜蔬精細謂之造虀毎碗十文麫與肉相停謂之合羮又有單羮乃半箇也舊只用匙今皆用筯矣更有挿肉撥刀炒羊細物料碁子餛飩店及有素分茶如寺院齋食也又有菜麫胡蝶虀肐􆃏及賣隨飯荷包白飯旋切細料餶飿兒𤓰虀蘿蔔之類肉行坊巷橋市皆有肉案列三五人操刀生熟肉從便索喚闊切片批細抹頓刀之類至晚即有燠爆熟食上市凡買物不上數錢得者是數餅店凡餅店有油餅店有胡餅店若油餅店即賣蒸餅糖餅裝合引盤之類胡餅店即賣門油菊花寛焦側厚油碢髓餅新様滿麻毎案用三五人捍劑卓花入爐自五更卓案之聲逺近相聞唯武成王廟前海州張家皇建院前鄭家㝡盛毎家有五十餘爐魚行賣生魚則用淺抱桶以栁葉間串清水中浸或循街出賣毎日早惟新鄭門西水門萬勝門如此生魚有數千檐入門冬月即黄河諸逺處客魚來謂之車魚毎斤不上一百文東亰夢華録巻四
