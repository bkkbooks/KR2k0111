  text: 欽定四庫全書史部十一
  hash: sha256:5f8ab01fbfc809cc911a707e5aa22577e1ed198056f701795ddffcd84b7bc12f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0111_WYG_000-1a, image: WYG0589/WYG0589-0125a.png}
body:
  text: 東京夢華録地理類八雜記之屬提要臣等謹案東京夢華録十巻宋孟元老撰通考謂元老不知何許人此書自都城坊市風俗及當時典禮儀衞靡不核載所紀與宋志頗有異同如宋志南郊儀注郊前三日但云齋於大慶殿太廟及青城齋宫而是書載車駕􅀫大慶殿儀駕􅀫太廟奉神主出室儀駕詣青城齋宫儀委曲詳盡又如郊畢解嚴宋志但云御宣徳門肆赦而是書載下赦儀亦極周至惟行禮儀注宋志有皇帝初登壇上香奠玉幣儀既降盥洗再登壇然後初獻而是書奏請駕登壇即初獻無上香獻玉帛儀又太祝讀冊宋志列在初獻時是書初獻之後再登壇始稱讀祝則不及宋志之密然參互考核不可謂無禆史學也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書東亰夢華録自序僕從先人宦㳺南北崇寧癸未到亰師卜居於州西金梁橋西夾道之南漸次長立正當輦轂之下太平日乆人物繁阜垂髫之童但習鼓舞班白之老不識干戈時節相次各有觀賞燈宵月夕雪際花時乞巧登髙教池㳺苑舉目則青樓畫閣繡戸珠簾雕車競駐於天街寳馬爭馳於御路金翠耀目羅綺飄香新聲巧笑於栁陌花衢按管調絃於茶坊酒肆八荒爭湊萬國咸通集四海之珍竒皆歸市易會寰區之異味悉在庖厨花光滿路何限春遊簫鼓喧空幾家夜宴伎巧則驚人耳目侈奢則長人精神瞻天表則元夕教池拜郊孟享頻觀公主下降皇子納妃修造則創建明堂冶鑄則立成鼎鼐觀妓籍則府曹衙罷内省宴回看變化則舉子唱名武人換授僕數十年爛賞疊遊莫知厭足一旦兵火靖康丙午之明年出亰南來避地江左情緒牢落漸入桑榆暗想當年節物風流人情和美但成悵恨近與親戚會面談及曩昔後生往往妄生不然僕恐浸乆論其風俗者失於事實誠為可惜謹省記編次成集庶幾開巻得覩當時之盛古人有夢遊華胥之國其樂無涯者僕今追念回首悵然豈非華胥之夢覺哉目之曰夢華録然以亰師之浩穰及有未嘗經從處得之於人不無遺闕倘遇鄉黨宿德補綴周備不勝幸甚此録語言鄙俚不以文飾者盖欲上下通曉耳觀者幸詳焉紹興丁卯歲除日幽蘭居士東亰孟元老序
