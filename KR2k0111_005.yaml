body:
  text: 東亰夢華録巻五宋孟元老撰民俗凡百所賣飲食之人裝鮮浄盤合器皿車檐動使竒巧可愛食味和羮不敢草略其賣藥賣卦皆具冠帶至於乞丐者亦有規格稍似懈怠衆所不容其士農工商諸行百戸衣裝各有本色不敢越外謂如香鋪褁香人即頂㡌披背質庫掌事即着皂衫角帶不頂㡌之類街市行人便認得是何色目加之人情高誼若見外方之人為都人凌欺衆必救䕶之或見軍鋪收領到鬭爭公事横身勸救有陪酒食檐官方救之者亦無憚也或有從外新來隣左居住則相借措動使獻遺湯茶指引買賣之類更有提茶瓶之人毎日隣里互相支茶相問動静凡百吉㐫之家人皆盈門其正酒店戸見脚店三兩次打酒便敢借與三五百兩銀器以至貧下人家􅈬店呼酒亦用銀器供送有連夜飲者次日取之諸妓館只􅈬店呼酒而巳銀器供送亦復如是其闊略大量天下無之也以其人煙浩穰添十數萬衆不加多減之不覺少所謂花陣酒池香山藥海别有幽坊小巷燕館歌樓舉之萬數不欲繁碎亰瓦伎藝崇觀以來在亰瓦肆伎藝張廷叟孟子書主張小唱李師師徐婆惜封宜奴孫三四等誠其角者嘌唱弟子張七七王亰奴左小四安娘毛團等教坊減罷并温習張翠盖張成弟子薛子大薛子小俏枝兒楊緫惜周壽奴稱心等般雜劇枝頭傀儡任小三毎日五更頭回小雜劇差晚看不及矣懸絲傀儡張金線李外寧藥發傀儡張臻妙温奴哥真箇强没勃臍小掉刀筋骨上索雜手伎渾身眼李宗正張哥毬杖錫弄孫寛孫十五曾無黨高恕李孝詳講史李慥楊中立張十一徐明趙世亨賈九小說王顔喜盖中寳劉名廣散藥張真奴舞旋楊望亰小兒相撲雜劇掉刀蠻牌董十五趙七曹保義朱婆兒没困駝風僧哥爼六弄影戲丁儀瘦吉等弄喬影戲劉百禽弄䖝蟻孔三傳耍秀才諸宫調毛詳霍伯醜商謎呉八兒合生張山人說諢話劉喬河北子帛遂胡牛兒達眼五重明喬駱駝兒李敦等雜班外入孫三神鬼霍四䆒說三分尹常賣五代史文八娘呌果子其餘不可勝數不以風雨寒暑諸棚看人日日如是教坊鈞容直毎遇旬休按樂亦許人觀看毎遇内宴前一月教坊内勾集弟子小兒習隊舞作樂雜劇節次娶婦凡娶媳婦先起草帖子兩家允許然後起細帖子序三代名諱議親人有服親田産官職之類次檐許口酒以絡盛酒瓶裝以大花八朶羅絹生色或銀勝八枚又以花紅繳檐上謂之繳檐紅與女家女家以淡水二瓶活魚三五箇筯一雙悉送在元酒瓶内謂之回魚筯或下小定大定或相媳婦與不相若相媳婦即男家親人或婆往女家看中即以釵子挿冠中謂之挿釵子或不入意即留一兩端綵叚與之壓驚則此親不諧矣其媒人有數等上等戴盖頭着紫背子說官親宫院恩澤中等戴冠子黄包䯻背子或只繫裙手把青􅋽傘兒皆兩人同行下定了即旦望媒人傳語遇節序即以節物頭面羊酒之類追女家隨家豐儉女家多回巧作之類次下財禮次報成結日子次過大禮先一日或是日早下催粧冠帔花粉女家回公裳花幞頭之類前一日女家先來掛帳鋪設房卧謂之鋪房女家親人有茶酒利市之類至迎娶日兒家以車子或花檐子發迎客引至女家門女家管待迎客與之綵叚作樂催粧上車檐從人未肯起炒咬利市謂之起檐子與了然後行迎客先回至兒家門從人及兒家人乞覔利市錢物花紅等謂之攔門新婦下車子有隂陽人執斗内盛榖豆錢菓草節等呪祝望門而撒小兒輩爭拾之謂之撒榖豆俗云厭青羊等殺神也新人下車檐踏青布條或氊席不得踏地一人捧鏡倒行引新人跨鞍驀草及秤上過入門於一室内當中懸帳謂之坐虛帳或只徑入房中坐於床上亦謂之坐富貴其送女客急三盞而退謂之走送衆客􅈬筵三盃之後婿具公裳花勝簇面於中堂昇一榻上置椅子謂之高坐先媒氏請次姨氏或姈氏請各斟一盃飲之次丈母請方下坐新人門額用綵一叚碎裂其下横抹掛之婿入房即衆爭撦小片而去謂之利市繳門紅婿於床前請新婦出二家各出綵叚綰一同心謂之牽巾男掛於笏女搭於手男倒行出面皆相向至家廟前叅拜畢女復倒行扶入房講拜男女各爭先後對拜畢􅈬床女向左男向右坐婦女以金錢綵菓散擲謂之撒帳男左女右留少頭髮二家出疋叚釵子朩梳頭鬚之類謂之合髻然後用兩盞以綵結連之互飲一盞謂之交盃酒飲訖擲盞并花冠子於床下盞一仰一合俗云大吉則衆喜賀然後掩帳訖宫院中即親隨人抱女婿去巳下人家即行出房叅謝諸親復􅈬飲酒散後次日五更用一卓盛鏡臺鏡子於其上望堂展拜謂之新婦拜堂次拜尊長親戚各有綵叚巧作鞋襪等為獻謂之賞賀尊長則復換一疋回之謂之答賀婿復叅婦家謂之拜門有力能趣辦次日即往謂之復面拜門不然三日七日皆可賞賀亦如女家之禮酒殽女家具鼓吹從物迎婿還家三日女家送綵叚油宻蒸餅謂之密和油蒸餅其女家來作㑹謂之煖女七日則取女歸或送綵叚頭面與之謂之洗頭一月則大會相慶謂之滿月自此以後禮數簡矣育子凡孕婦入月於初一日父母家以銀盆或錂或綵畫盆盛粟稈一束上以錦繡或生色帕複盖之上挿花朶及通草帖羅五男二女花様用盤合裝送饅頭謂之分痛并作眠羊卧鹿羊生菓實取其眠卧之義并牙兒衣物䙀籍等謂之催生􅈬蓐分娩訖人爭送粟米炭醋之類三日落臍炙𩕄七日謂之一臘至滿月則生色及綳繡錢貴富家金銀犀玉為之并菓子大展洗兒會親賓盛集煎香湯於盆中下菓子綵錢葱蒜等用數丈綵繞之名曰圍盆以釵子攪水謂之攪盆觀者各撒錢於水中謂之添盆盆中棗子直立者婦人爭取食之以為生男之徵浴兒畢落胎髪遍謝坐客抱牙兒入他人房謂之移窠生子百日置會謂之百晬至來歲生日謂之周晬羅列盤琖於地盛菓朩飲食官誥筆研筭秤等經巻針線應用之物觀其所先拈者以為徵兆謂之試晬此小兒之盛禮也東亰夢華録巻五
  hash: sha256:1118a43de718ae485b37978e23c57f4f798a644071bbdaf8a1b028e041566c6a
