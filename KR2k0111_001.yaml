  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0111_WYG_001-1a, image: WYG0589/WYG0589-0127c.png}
body:
  text: 東亰夢華録卷一宋孟元老撰東都外城東都外城方圓四十餘里城濠曰護龍河濶十餘丈濠之內外皆植楊栁粉牆朱戶禁人往來城門皆甕城三層屈曲開門唯南薰門新鄭門新宋門封邱門皆直門兩重蓋此係四正門皆留御路故也新城南壁其門有三正南門曰南薰門城南一邊東南則陳州門傍有蔡河水門西南則戴樓門傍亦有蔡河水門蔡河正名惠民河為通蔡州故也東城一邊其門有四東南曰東水門乃汴河下流水門也其門跨河有鐵褁窗門遇夜如閘垂下水面兩岸各有門通人行路出拐子城夾岸百餘丈次則曰新宋門次曰新曹門又次曰東北水門乃五丈河之水門也西城一邊其門有四從南曰新鄭門次曰西水門汴河上水門也次曰萬勝門又次曰固子門又次曰西北水門乃金水河水門也北城一邊其門有四從東曰陳橋門乃大遼人使驛路次曰封邱門北郊御路次曰新酸棗門次曰衛州門諸門名皆俗呼其正名如西水門曰利澤鄭門本順天門固子門本金耀門新城每百步設馬面戰棚密置女頭旦暮修整望之聳然城裏牙道各植榆栁成隂每二百步置一防城庫貯守禦之器有廣固兵士二十指揮每日修造泥飾專有亰城所提總其事舊亰城舊亰城方圓約二十里許南壁其門有三正南曰朱雀門左曰保康門右曰新門東壁其門有三從南汴河南岸角門子河北岸曰舊宋門次曰舊曹門西壁其門有三從南曰舊鄭門次汴河北岸角門子次曰梁門北壁其門有三從東曰舊封邱門次曰景龍門乃大內城角實籙宫前也次曰金水門河道穿城河道有四南壁曰蔡河自陳蔡由西南戴樓門入亰城遼繞自東南陳州門出河上有橋十一自陳州門裏曰觀橋在五嶽觀後門從北次曰宣泰橋次曰雲騎橋次曰橫橋子在彭婆婆宅前次曰高橋次曰西保康門橋次曰龍津橋正對內前次曰新橋次曰太平橋高殿前宅前次曰糶麥橋次曰第一座橋次曰宜男橋出戴樓門外曰四里橋中曰汴河自西亰洛口分水入亰城東去至泗州入淮運東南之糧凡東南方物自此入亰城公私仰給焉自東水門外七里至西水門外河上有橋十三從東水門外七里曰虹橋其橋無柱皆以巨朩虛架飾以丹艧宛如飛虹其上下土橋亦如之次曰順成倉橋入水門裏曰便橋次曰下土橋次曰上土橋投西角子門曰相國寺橋次曰州橋正名大漢橋正對於大內御街其橋與相國寺橋皆低平不通舟船唯西河平船可過其柱皆青石為之石梁石笋楯欄近橋兩岸皆石壁雕鐫海馬水獸飛雲之狀橋下密排石柱蓋車駕御路也州橋之北岸御路東西兩闕樓觀對聳橋之西有方淺船二隻頭置巨幹鐵鎗數條岸上有鐵索三條遇夜絞上水面蓋防遺失舟船矣西去曰浚儀橋次曰興國寺橋亦名馬軍軍衙橋次曰太師府橋蔡相宅前次曰金梁橋次曰西浮橋舊以船為之橋今皆用木石造矣次曰西水門便橋門外曰橫橋東北曰五丈河來自濟鄆般挽亰東路糧斛入亰城自新曹門北入亰河上有橋五東去曰小橫橋次曰廣備橋次曰蔡市橋次曰青暉橋染院橋西北曰金水河自亰城西南分亰索河水築堤從汴河上用朩槽架過從西北水門入亰城夾墻遮擁入大內灌後苑池浦矣河上有橋三曰白虎橋橫橋五王宫橋之類又曹門小河子橋曰念佛橋蓋內諸司輦官親事官之類軍營皆在曹門侵晨上直有瞽者在橋上念經求化得其名矣大內大內正門宣德樓列五門門皆金釘朱漆壁皆磚石間甃鐫鏤龍鳳飛雲之狀莫非雕甍畫棟峻桷層榱覆以琉璃瓦曲尺朵樓朱欄彩檻下列兩闕亭相對悉用朱紅􅒎子入宣德樓正門乃大慶殿庭設兩樓如寺院鐘樓上有太史局保章正測驗刻漏逐時刻執牙牌奏每遇大禮車駕齋宿及正朔朝會於此殿殿外左右橫門曰左右長慶門內城南壁有門三座係大朝會趨朝路宣德樓左曰左掖門右曰右掖門左掖門裏乃明堂右掖門裏西去乃天章寶文等閣宫城至北廊約百餘丈入門東去街北廊乃樞密院次中書省次都堂宰相朝退治事於此次門下省次大慶殿外廊橫門北去百餘步又一橫門每日宰執趨朝此處下馬餘侍從臺諫於第一橫門下馬行至文德殿入第二橫門東廊大慶殿東偏門西廊中書門下後省次修國史院次南向小角門正對文德殿常朝殿也殿前東西大街東出東華門西出西華門近裏又兩門相對左右嘉肅門也南去左右銀臺門自東華門裏皇太子宫入嘉肅門街南大慶殿後門東西上閣門街北宣祐門南北大街西廊面東曰凝暉殿乃通會通門入禁中矣殿相對東廊門樓乃殿中省六尚局御厨殿上常列禁衛兩重時刻提警出入甚嚴近裏皆近侍中貴殿之外皆知省御藥幕次快行親從官輦官車子院黃院子內諸司兵士祗候宣喚及宫禁買賣進貢皆由此入唯此浩穰諸司人自賣飲食珍竒之物市井之間未有也每遇早晚進膳自殿中省對凝暉殿禁衛成列約欄不得過往省門上有一人呼喝謂之撥食家次有紫衣褁腳子向後曲折幞頭者謂之院子家托一合用黃繡龍合衣籠罩左手携一紅羅繡手巾進入於此約十餘合繼托金瓜合二十餘面進入非時取喚謂之泛索宣祐門外西去紫宸殿正朔受朝於此次曰文德殿常朝所御次曰垂拱殿次曰皇儀殿次曰集英殿御宴及試舉人於此後殿曰崇政殿保和殿內書閣曰眷思殿後門曰拱辰門東華門外市井最盛蓋禁中買賣在此凡飲食時新花果魚蝦鱉蟹鶉兔脯臘金玉珍玩衣著無非天下之竒其品味若數十分客要一二十味下酒隨索目下便有之其歲時果瓜蔬茹新上市並茄瓠之類新出每對可直三五十千諸閣分爭以貴價取之內諸司內諸司皆在禁中如學士院皇城司四方館客省東西上閣門通進司內弓劒鎗甲軍器等庫翰林司茶酒局也內侍省入內內侍省內藏庫奉宸庫景福殿庫延福宫殿中省六尚局尚藥尚食尚輦尚醖尚舍尚衣諸閣分內香藥庫後苑作翰林書藝局醫官局天章等閣明堂頒朔布政府外諸司外諸司左右金吾街仗司法酒庫內酒坊牛羊司乳酪院儀鸞司帳設局也車輅院供奉庫雜物庫雜賣務東西作坊萬全造軍器所修內司文思院上下界綾錦院文繡院軍器所上下竹朩務箔場車營致逺務騾務駝坊象院作坊物料庫東西窰務內外物庫油醋庫亰城守具所鞍轡庫養馬曰左右騏驥院天駟十監河南北十炭場四熟藥局內外柴炭庫軍頭引見司架子營樓店務店宅務𣙜貨務都茶場大宗正司左藏大觀元豐宣和等庫編估局打套所諸米麥等自州東虹橋元豐倉順成倉東水門裏廣濟裏河折中外河折中富國廣盈萬盈永豐濟逺等倉陳州門裏麥倉子州北夷門山五丈河諸倉約共有五十餘所日有支納下卸即有下卸指軍兵士支遣即有袋家每人肩兩石布袋遇有支遣倉前成市近新城有草場二十餘所每遇冬月諸鄉納粟稈草牛車闐塞道路車尾相銜數千萬輛不絶場內堆積如山諸軍打請營在州北即往州南倉不許雇人般擔並要親自負來此祖宗之法也東亰夢華録卷一
