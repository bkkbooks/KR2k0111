body:
  text: 東亰夢華録卷二宋孟元老撰御街坊巷御街自宣德樓一直南去約濶二百餘步兩邊乃御廊舊許市人買賣於其間自政和間官司禁止各安立黑漆􅒎子路心又安朱漆􅒎子兩行中心御道不得人馬行往行人皆在廊下朱􅒎子之外􅒎子裏有磚石甃砌御溝水兩道宣和間盡植蓮荷近岸植桃李梨杏雜花相間春夏之間望之如繡宣德樓前省府宫宇宣德樓前左南廊對左掖門為明堂頒朔布政府祕書省右廊南對右掖門近東則兩府八位西則尚書省御街大內前南去左則景靈東宫右則西宫近南大晟府次曰太常寺州橋曲轉大街面南曰左藏庫近東鄭太宰宅青魚市內行景靈東宫南門大街以東南則唐家金銀鋪溫州漆器什物鋪大相國寺直至十三間樓舊宋門自大內西廊南去即景靈西宫南曲對即報慈寺街都進奏院百種圓藥鋪至浚儀橋大街西宫南皆御廊􅒎子至州橋投西大街乃果子行街北都亭驛大遼人使驛也相對梁家珠子鋪餘皆賣時行紙畫花果鋪席至浚儀橋之西即開封府御街一直南去過州橋兩邊皆居民街東車家炭張家酒店次則王樓山洞梅花包子李家香鋪曹婆婆肉餅李四分茶至朱雀門街西過橋即投西大街謂之麯院街街南遇仙正店前有樓子後有臺都人謂之臺上此一店最是酒店上戶銀瓶酒七十二文一角羊羔酒八十一文一角街北薛家分茶羊飯熟羊肉鋪向西去皆妓館舍都人謂之院街御廊西即鹿家包子餘皆羮店分茶酒店香藥鋪居民朱雀門外街巷出朱雀門東壁亦人家東去大街麥楷巷狀元樓餘皆妓館至保康門街其御街東朱雀門外西通新門瓦子以南殺豬巷亦妓館以南東西兩教坊餘皆居民或茶坊街心市井至夜尤盛過龍津橋南去路心又設朱漆􅒎子如內前東劉廉訪宅以南太學國子監過太學又有橫街乃太學南門街南熟藥惠民南局以南五里許皆民居又東去橫大街乃五嶽觀後門大街約半里許乃看街亭尋常車駕行幸登亭觀馬騎於此東至貢院什物庫禮部貢院車營務草場街南葆真宫直至蔡河雲騎橋御街至南薰門裏街西五嶽觀最為雄壯自西門東去觀橋宣泰橋栁隂牙道約五里許內有中太一宫佑神觀街南明麗殿奉靈園九成宫內安頓九鼎近東即迎祥池夾岸垂楊菰蒲蓮荷鳬鴈遊泳其間橋亭臺榭棊布相峙唯每歲清明日放萬姓燒香遊觀一日龍津橋南西壁鄧樞密宅以南武學巷內曲子張宅武成王廟以南張家油餅明節皇后宅西去大街曰大巷口又西曰清風樓酒店都人夏月多乘􅋽於此以西老鴉巷口軍器所直接第一座橋自大巷口南去延真觀延接四方道民於此以南西去小巷口三學院西去直抵宜男橋小巷南去即南薰門其門尋常士庶殯葬車輿皆不得經由此門而出謂正與大內相對唯民間所宰豬須從此入亰每日至晚每羣萬數止十數人驅逐無有亂行者州橋夜市出朱雀門直至龍津橋自州橋南去當街水飯􅠉肉乾脯王樓前貛兒野狐肉脯雞梅家鹿家鵝鴨雞兔肚肺鱔魚包子雞皮腰腎雞碎每箇不過十五文曹家從食至朱雀門旋煎羊白腸鮓脯㸇凍魚頭薑豉􅯴子抹臟紅絲批切羊頭辣腳子薑辣蘿蔔夏月麻腐雞皮麻飲細粉素簽沙糖氷雪冷元子水晶角兒生淹水朩瓜藥朩瓜雞頭穰沙糖菉豆甘草氷雪􅋽水荔枝膏廣芥瓜兒醎菜杏片梅子薑萵苣笋芥辣瓜兒細斜餶飿兒香糖果子間道糖荔枝越梅􅘫刀紫蘇膏金絲黨梅香棖元皆用梅紅匣兒盛貯冬月盤兔旋炙豬皮肉野鴨肉滳酥水晶鱠煎角子豬臟之類直至龍津橋須腦子肉止謂之雜嚼直至三更東角樓街巷自宣德東去東角樓乃皇城東南角也十字街南去薑行高頭街北去從紗行至東華門街晨暉門寶籙宫直至舊酸棗門最是鋪席要閙宣和間展夾城牙道矣東去乃潘樓街街南曰鷹店只下販鷹鶻客餘皆真珠匹帛香藥鋪席南通一巷謂之界身並是金銀綵帛交易之所屋宇雄壯門面廣闊望之森然每一交易動即千萬駭人聞見以東街北曰潘樓酒店其下每日自五更市合買賣衣物書畫珍玩犀玉至平明羊頭肚肺赤白腰子妳房肚胘鶉兔鳩鴿野味螃蟹蛤蜊之類訖方有諸手作人上市買賣零碎作料飯後飲食上市如酥密食棗䭅砂團子香糖果子密煎雕花之類向晚賣河婁頭面冠梳領抹珍玩動使之類東去則徐家瓠羹店街南桑家瓦子近北則中瓦次𠂻瓦其中大小勾欄五十餘座內中瓦子蓮花棚牡丹棚裏瓦子夜義棚象棚最大可容數千人自丁先現王團子張七聖輩後來可有人於此作場瓦中多有貨藥賣卦喝故衣探摶飲食剃剪紙畫令曲之類終日居此不覺抵暮潘樓東街巷潘樓東去十字街謂之土市子又謂之竹竿市又東十字大街曰從行褁角茶坊每五更點燈博易買賣衣服圖畫花環領抹之類至曉即散謂之鬼市子以東街北趙十萬宅街南中山正店東榆林巷北鄭皇后宅東曲首向北墻畔單將軍廟乃單雄信墓也上有棗樹世傳乃棗槊發芽生長成樹又謂之棗冡子巷又投東則舊曹門街北山子茶坊內有仙洞仙橋士女往往夜遊喫茶於彼又李生菜小兒藥鋪仇防禦藥鋪出舊曹門朱家橋瓦子下橋南斜街北斜街內有泰山廟兩街有妓館橋頭人煙市井不下州南以東牛行街下馬劉家藥鋪看牛樓酒店亦有妓館一直抵新城自土市子南去鐵屑樓酒店皇建院街得勝橋鄭家油餅店動二十餘爐直南抵太廟街髙陽正店夜市尤盛土市北去乃馬行街也人煙浩閙先至十字街曰鷯兒市向東曰東雞兒巷西向曰西雞兒巷皆妓館所居近北街曰楊樓街東曰莊樓今改作和樂樓樓下乃賣馬市也近北曰任店今改作欣樂樓對門馬鐺家羮店酒樓凡亰師酒店門首皆縳綵樓歡門唯任店入其門一直主廊約百餘步南北天井兩廊皆小閣子向晚燈燭熒煌上下相照濃粧妓女數百聚於主廊面上以待酒客呼喚望之宛若神仙北去楊樓以北穿馬行街東西兩巷謂之大小貨行皆工作伎巧所居小貨行通雞兒巷妓館大貨行通箋紙店白礬樓後改為豐樂樓宣和間更修三層相髙五樓相向各有飛橋欄檻明暗相通珠簾繡額燈燭晃耀初開數日每先到者賞金旗過一兩夜則巳元夜則每一瓦隴中皆置蓮燈一盞內西樓後來禁人登眺以第一層下視禁中大抵諸酒肆瓦市不以風雨寒暑白晝通夜駢闐如此州東宋門外仁和店薑店州西宜城樓藥張四店班樓金梁橋下劉樓曹門蠻王家乳酪張家州北八仙樓戴樓門張八家園宅正店鄭門河王家李七家正店景靈宫東墻長慶樓在亰正店七十二戶此外不能遍數其餘皆謂之腳店賣貴細下酒迎接中貴飲食則第一白厨州西安州巷張秀以次保康門李慶家東雞兒巷郭厨鄭皇后宅後宋厨曹門磚筒李家寺東骰子李家黃胖家九橋門街市酒店綵樓相對繡斾相招掩翳天日政和後來景靈宫東墻下長慶樓尤盛飲食果子凡店內賣下酒厨子謂之茶飯量酒博士至店中小兒子皆通謂之大伯更有街坊婦人腰繫青花布手巾綰危髻為酒客換湯斟酒俗謂之焌糟更有百姓入酒肆見子弟少年輩飲酒近前小心供過使令買物命妓取送錢物之類謂之間漢又有向前換湯斟酒歌唱或獻果子香藥之類客散得錢謂之厮波又有下等妓女不呼自來筵前歌唱臨時以些小錢物贈之而去謂之劄客亦謂之打酒坐又有賣藥或果實蘿蔔之類不問酒客買與不買散與坐客然後得錢謂之撒暫如此處處有之唯州橋炭張家乳酪張家不放前項人入店亦不賣下酒唯以好淹藏菜蔬賣一色好酒所謂茶飯者乃百味羮頭羮新法鵪子羮三脆羮二色腰子蝦菌雞菌渾炮等羮旋索粉玉碁子羣仙羮假河魨白泄虀貨鱖魚假元魚決明兜子決明湯虀肉醋托胎襯腸沙魚兩熟紫蘇魚假蛤蜊白肉夾面子茸割肉胡餅湯骨頭乳炊羊羊閙廳羊角腰子鵝鴨排蒸荔枝腰子還元腰子燒臆子入爐細項蓮花鴨簽酒炙肚胘虛汁垂絲羊頭入爐羊羊頭簽鵝鴨簽雞簽盤兔炒兔蔥潑兔假野狐金絲肚羹石肚羹假炙獐煎鵪子生炒肺炒蛤蜊炒蟹泄蟹洗手蟹之類逐時旋行索喚不許一味有闕或别呼索變造下酒亦即時供應又有外來托賣炙雞燠鴨羊腳子點羊頭脆筋巴子薑蝦酒蟹獐巴鹿脯從食蒸作海鮮時果旋切萵苣生菜西亰笋又有小兒子著白虔布衫青花手巾挾白磁缸子賣辣菜又有托小盤賣乾果子乃旋炒銀杏栗子河北鵝梨梨條梨乾梨肉膠棗棗圈梨圈桃圈核桃肉牙棗海紅嘉慶子林檎旋烏李李子旋櫻桃煎西亰雨梨尖梨甘棠梨鳳栖梨鎮府濁梨河隂石榴河陽查子查條沙苑榅桲回馬孛萄西川乳糖獅子糖霜峰兒橄欖溫柑綿棖金橘龍眼荔枝召白藕甘蔗漉梨林檎乾枝頭乾芭蕉乾人面子巴覽子榛子棐子蝦具之類諸般密煎香藥果子罐子黨梅柿膏兒香藥小元兒小臘茶鵬沙元之類更外賣軟羊諸色包子豬羊荷包燒肉乾脯玉板鮓犯鮓片醬之類其餘小酒店亦賣下酒如煎魚鴨子炒雞兔煎燠肉梅汁血羮粉羮之類每分不過十五錢諸酒店必有廳院廊廡掩映排列小閣子吊窗花竹各垂簾幕命妓歌笑各得穩便東亰夢華録卷二
