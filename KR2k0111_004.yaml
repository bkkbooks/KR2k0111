body:
  text: 東亰夢華録卷四宋孟元老撰軍頭司軍頭司每旬休按閲內等子相撲手劒捧手格鬪諸軍營殿前指揮使直在禁中有左右班內殿直散貟散都頭散直散指揮御龍左右直係打御從物御龍骨朵子直弓箭直弩直習馭直騎御馬鈞容直招箭班金鎗班銀鎗班殿侍諸軍東西五班常入祗候每日教閲野戰每遇諸路解到武藝人對御格鬭天武捧日龍衛神衛各二十指揮謂之上四軍不出戍驍騎雲騎拱聖龍猛龍騎各午指揮殿前司步軍司有虎翼各二十指揮虎翼水軍宣武各十五指揮神勇廣勇各十指揮飛山林子弩雄武廣固等指揮諸司則宣效六軍武肅武和街道司諸司諸軍指揮動以百數諸宫觀宅院各有清衛廂軍禁軍剩貟十指揮其餘工匠修內司八作司廣固作坊後花作坊書藝局綾錦院文繡院內酒坊法酒庫牛羊司油庫儀鸞司翰林司喝探武嚴輦官車子院皇城官親從官親事官上下宫皇城黃皂院子滌除各有指揮記省不盡皇太子納妃皇太子納妃鹵簿儀仗宴樂儀衛妃乘厭翟車車上設紫色團蓋四柱維幕四垂大帶四馬駕之公主出降公主出降亦設儀仗行幕步障水路凡親王公主出則有之皆係街道司兵級數十人各執掃具鍍金銀水桶前導酒之名曰水路用擔床數百鋪設房卧並紫衫卷腳幞頭天武官擡兒又有宫嬪數十皆真珠叉插吊朵玲瓏簇羅頭面紅羅銷金袍帔乘馬雙控雙搭青蓋前導謂之短鐙前後用紅羅銷金掌扇遮簇乘金銅簷子覆以剪棕朱紅梁脊上列滲金銅鑄雲鳳花朵簷子約髙五尺許深八尺濶四尺許內容六人四維垂繡額珠黨白藤間花匡箱之外兩壁出攔檻皆縷金花裝雕朩人物神仙出隊兩竿十二人竿前後皆設緑絲絛金魚勾子勾定皇后出乘輿皇太后皇后出乘者謂之輿比簷子稍增廣花樣皆龍前後簷皆剪棕儀仗與駕出相似而少仍無駕頭警蹕耳士庶家與貴家婚嫁亦乘簷子只無脊上銅鳳花朵左右兩軍自有假賃所在以至從人衫帽衣服從物俱可賃不須借措餘命婦王宫士庶通乘坐車子如簷子樣製亦可容六人前後有小勾欄底下軸貫兩挾朱輪前出長轅約七八尺獨牛駕之亦可假賃雜賃若凶事出殯自上而下凶肆各有體例如方相車輿結絡綵帛皆有定價不須勞力尋常出街市幹事稍似路逺倦行逐坊巷橋市自有假賃鞍馬者不過百錢修整雜貨及齋僧請道儻欲修整屋宇泥補墻壁生辰忌日欲設齋僧尼道士即早辰橋市街巷口皆有朩竹匠人謂之雜貨工匠以至雜作人夫道士僧人羅立會聚候人請喚謂之羅齋竹朩作料亦有鋪席磚瓦泥匠隨手即就筵會假賃凡民間吉凶筵會椅卓陳設器皿合盤酒簷動使之類自有茶酒司管賃喫食下酒自有厨司以至托盤下請書安排坐次尊前執事歌説勸酒謂之白席人總謂之四司人欲就園館亭榭寺院遊賞命客之類舉意便辦亦各有地分承攬排備自有則例亦不敢過越取錢雖百十分廳館整肅主人只出錢而巳不用費力會仙酒樓如州東仁和店新門裏會仙樓正店常有百十分廳館動使各各足備不尚少闕一件大抵都人風俗奢侈度量稍寬凡酒店中不問何人止兩人對坐飲酒亦須用注碗一副盤盞兩副果菜楪各五斤水菜碗三五隻即銀近百兩矣雖一人獨飲碗遂亦用銀盂之類其果子菜蔬無非精潔若别要下酒即使人外買軟羊龜背大小骨諸色包子玉板鮓生削巴子瓜薑之類食店大凡食店大者謂之分茶則有頭羮石髓羮白肉胡餅軟羊大小骨角炙犒腰子石肚羮入爐羊罨生軟羊麵桐皮麵薑潑刀回刀冷淘棊子寄爐麵飯之類喫全茶饒虀頭羮更有川飯店則有插肉麵大燠麵大小抹肉淘煎燠肉雜煎事件生熟燒飯更有南食店魚兜子桐皮熟膾麵煎魚飯又有瓠羮店門前以枋朩及花樣呇結縳如山棚上挂成邊豬羊相間三二十邊近裏門面窗戶皆朱緑裝飾謂之歡門每店各有廳院東西廊稱呼坐次客坐則一人執筯紙遍問坐客都人侈縱百端呼索或熱或冷或溫或整或絶冷精澆臕澆之類人人索喚不同行菜得之近局次立從頭唱念報與局內當局者謂之鐺頭又曰著案訖須臾行菜者左手􅒎三碗右臂自手至肩馱疊約二十碗散下盡合各人呼索不容差錯一有差錯坐客白之主人必加叱罵或罰工價甚者逐之吾輩入店則用一等琉璃淺稜碗謂之碧碗亦謂之造羮菜蔬精細謂之造虀每碗十文麵與肉相停謂之合羮又有單羮乃半箇也舊只用匙今皆用筯矣更有插肉撥刀炒羊細物料碁子餛飩店及有素分茶如寺院齋食也又有菜麵胡蝶虀胳􆃏及賣隨飯荷包白飯旋切細料餶飿兒瓜虀蘿蔔之類肉行坊巷橋市皆有肉案列三五人操刀生熟肉從便索喚闊切片批細抹頓刀之類至晚即有燠爆熟食上市凡買物不上數錢得者是數餅店凡餅店有油餅店有胡餅店若油餅店即賣蒸餅糖餅裝合引盤之類胡餅店即賣門油菊花寬焦側厚油碢髓餅新樣滿麻每案用三五人捍劑卓花入爐自五更卓案之聲逺近相聞唯武成王廟前海州張家皇建院前鄭家最盛每家有五十餘爐魚行賣生魚則用淺抱桶以栁葉間串清水中浸或循街出賣每日早惟新鄭門西水門萬勝門如此生魚有數千簷入門冬月即黃河諸逺處客魚來謂之車魚每斤不上一百文東亰夢華録卷四
