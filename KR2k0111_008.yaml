  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0111_WYG_008-1a, image: WYG0589/WYG0589-0162a.png}
body:
  text: 東京夢華録卷八宋孟元老撰四月八日四月八日佛生日十大禪院各有浴佛齋會煎香藥糖水相遺名曰浴佛水迤邐時光晝永氣序清和榴花院落時聞求友之鶯細栁亭軒乍見引雛之燕在京七十二戶諸正店初賣煮酒市井一新唯州南清風樓最宜夏飲初嘗青杏乍薦櫻桃時得佳賓觥酬交作是月茄瓠初出上市東華門爭先供進一對可直三五十千者時果則御桃李子金杏林檎之類端午端午節物百索艾花銀樣鼓兒花花巧畫扇香糖果子糭子白團紫蘇菖蒲朩瓜並皆茸切以香藥相和用梅紅匣子盛褁自五月一日及端午前一日賣桃栁葵花蒲葉佛道艾次日家家鋪陳於門首與糭子五色水團茶酒供養又釘艾人于門上士庶迎相宴賞六月六日崔府君生日二十四日神保觀神生日六月六日州北崔府君生日多有獻送無盛如此二十四日州西灌口二郎生日最為繁盛廟在萬勝門外一里許勑賜神保觀二十三日御前獻送後苑作與書藝局等處製造戲玩如毬杖彈弓弋射之具鞍轡銜勒樊籠之類悉皆精巧作樂迎引至廟於殿前露臺上設樂棚教坊鈞容直作樂更互雜劇舞旋太官局供食連夜二十四盞各有節次至二十四日夜五更爭燒頭爐香有在廟止宿夜半起以爭先者天曉諸司及諸行百姓獻送甚多其社火呈於露臺之上所獻之物動以萬數自早呈拽百戲如上竿躍弄跳索相撲鼓板小唱鬬雞説諢話雜扮商謎合笙喬筋骨喬相撲浪子雜劇呌果子學像生倬刀裝鬼砑鼓牌棒道術之類色色有之至暮呈拽不盡殿前兩幡竿髙數十丈左則京城所右則修內司搭材分占上竿呈藝解或竿尖立橫朩列於其上裝神鬼吐煙火甚危險駭人至夕而罷是月巷陌雜賣是月時物巷陌路口橋門市井皆賣大小米水飯炙肉乾脯萵苣笋芥辣瓜兒義塘甜瓜衛州白桃南京金桃水鵝梨金杏小瑤李子紅菱沙角兒藥朩瓜水朩瓜氷雪涼水荔枝膏皆用青布繖當街列牀凳堆垜氷雪惟舊宋門外兩家最盛悉用銀器沙糖菉豆水晶皂兒黃冷團子雞頭穰氷雪細料餶飿兒麻飲雞皮細索涼粉素簽成串熟林檎脂麻團子江豆碢兒羊肉小饅頭龜兒沙饀之類都人最重三伏蓋六月中别無時節往往風亭水榭峻宇髙樓雪檻氷盤浮瓜沉李流杯曲沼苞鮓新荷逺邇笙歌通夕而罷七夕七月七夕潘樓街東宋門外瓦子州西梁門外瓦子北門外南朱雀門外街及馬行街內皆賣磨喝樂乃小塑土偶耳悉以雕朩彩裝欄座或用紅紗碧籠或飾以金珠牙翠有一對直數千者禁中及貴家與士庶為時物追陪又以黃蠟鑄為鳬鴈鴛鴦鸂鶒龜魚之類彩畫金縷謂之水上浮又以小板上傅土旋種粟令生苖置小茅屋花朩作田舍家小人物皆村落之態謂之榖板又以瓜雕刻成花樣謂之化瓜又以油麵糖蜜造為笑靨兒謂之果食花樣竒巧百端如捺香方勝之類若買一斤數內有一對被介胄者如門神之像蓋自來風流不知其從謂之果食將軍又以菉豆小豆小麥於磁器內以水浸之生芽數寸以紅藍綵縷束之謂之種生皆於街心綵幕帳設出絡貨賣七夕前三五日車馬盈市羅綺滿街旋折未開荷花都人善假做雙頭蓮取玩一時提㩦而歸路人往往嗟愛又小兒須買新荷葉執之蓋效顰磨喝樂兒童輩特地新粧競誇鮮麗至初六日七日晚貴家多結綵樓於庭謂之乞巧樓鋪陳磨喝樂花瓜酒炙筆硯針線或兒童裁詩女郎呈巧焚香列拜謂之乞巧婦女望月穿針或以小蜘蛛安合子內次日看之若網圓正謂之得巧里巷與妓館往往列之門首爭以侈靡相向磨喝樂本佛經摩㬋羅今通俗而書之中元節七月十五日中元節先數日市井賣冥器靴鞋幞頭帽子金犀假帶五綵衣服以紙糊架子盤遊出賣潘樓并州東西瓦子亦如七夕耍閙處亦賣果食種生花果之類及印賣尊勝目連經又以竹竿斫成三腳髙三五尺上織燈窩之狀謂之盂蘭盆挂搭衣服冥錢在上焚之構肆樂人自過七夕便般目連經救母雜劇直至十五日止觀者增倍中元前一日即賣練葉享祀時鋪襯卓面又賣麻榖窠鬼亦是繫在卓子腳上乃告祖先秋成之意又賣雞冠花謂之洗手花十五日供養祖先素食才眀即賣穄米飯巡門呌賣亦告成意也又賣轉眀菜花花油餅餕豏沙豏之類城外有新墳者即往拜掃禁中亦出車馬詣道者院謁墳本院官給祠部十道設大會焚錢山祭軍陳亡歿設孤魂道場立秋立秋日滿街賣楸葉婦女兒童輩皆剪成花樣戴之是月瓜果梨棗方盛京師棗有數品靈棗牙棗青州棗亳州棗雞頭上市則梁門裏李和家最盛中貴戚里取索供賣內中泛索金合絡繹士庶買之一褁十文用小新荷葉包槮以麝香紅小索兒繫之賣者雖多不及李和一色㨂銀皮子嫩者貨之秋社八月秋社各以社糕社酒相賫送貴戚宫院以豬羊肉腰子妳房肚肺鴨餅瓜薑之屬切作棊子片樣滋味調和鋪於飯上謂之社飯請客供養人家婦女皆歸外家晚歸即外公姨舅皆以新葫蘆兒棗兒為遺俗云宜良外甥市學先生預斂諸生錢作社會以致雇倩祗應白席歌唱之人歸時各擕花藍果實食物社糕而𣪚春社重午重九亦是如此中秋中秋節前諸店皆賣新酒重新結絡門面綵樓花頭畫竿醉仙錦斾市人爭飲至午未間家家無酒拽下望子是時螯蟹新出石榴榅勃梨棗栗孛萄弄色棖橘皆新上市中秋夜貴家結飾臺榭民間爭占酒樓玩月絲篁鼎沸近內庭居民夜深遙聞笙竽之聲宛若雲外閭里兒童連宵嬉戲夜市駢闐至於通曉重陽九月重陽都下賞菊有數種其黃白色蘂若蓮房曰萬齡菊粉紅色曰桃花菊白而檀心曰朩香菊黃色而圎者曰金鈴菊純白而大者曰喜容菊無處無之酒家皆以菊花縛成洞戶都人多出郊外登髙如倉王廟四里橋愁臺梁王城硯臺毛駝岡獨樂岡等處宴聚前一二日各以粉麵蒸糕遺送上插剪綵小旗摻飣果實如石榴子栗黃銀杏松子肉之類又以粉作獅子蠻王之狀置於糕上謂之獅蠻諸禪寺各有齋會惟開寶寺仁王寺有獅子會諸僧皆坐獅子上作法事講説逰人最盛下旬即賣冥衣靴鞋席帽衣假以十月朔日燒獻故也東京夢華録卷八
