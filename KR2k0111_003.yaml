  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0111_WYG_003-1a, image: WYG0589/WYG0589-0137a.png}
body:
  text: 東亰夢華録巻三宋孟元老撰馬行街北醫鋪馬行北去乃小貨行時樓大骨傅藥鋪直抵正係舊封邱門兩行金紫醫官藥鋪如杜金鈎家曹家獨勝元山水李家口齒咽喉藥石魚兒班防禦銀孩兒栢郎中家醫小兒大鞋任家産科其餘香藥鋪席官貟宅舍不欲遍記夜市北州橋又盛百倍車馬闐擁不可駐足都人謂之裏頭大内西右掖門外街巷大内西去右掖門祅廟直南浚儀橋街西尚書省東門至省前横街南即御史臺西即郊社省南門正對開封府後墻省西門謂之西車子曲史家瓠羮萬家饅頭在亰第一次曰呉起廟出巷乃大内西角樓大街西去踴路街南太平興國寺後門北對啓聖院街以西殿前司相對清風樓無比客店張戴花洗面藥國太丞張老兒金龜兒醜婆婆藥鋪唐家酒店直至梁門正名闔閭出梁門西去街北建隆觀觀内東廊于道士賣齒藥都人用之街南蔡太師宅西去州西瓦子南自汴河岸北抵梁門大街亞其裏瓦約一里有餘過街北即舊宜城樓近西去金梁橋街西大街荆筐兒藥鋪棗王家金銀鋪近北巷口熟藥惠民西局西去甕市子乃開封府刑人之所也西去盖防禦藥鋪大佛寺都亭西驛相對亰城守具所自甕市子北去大街班樓酒店以北大三橋子至白虎橋直北即衛州門大内前州橋東街巷大内前州橋之東臨汴河大街曰相國寺有橋平正如州橋與保康門相對橋西賈家瓠羮孫好手饅頭近南即保康門潘家黄耆圓延寧宫禁女道士觀人罕得入街西保康門瓦子東去㳂城皆客店南方官貟商賈兵級皆於此安泊近東四聖觀襪袎巷以東城角定力院内有朱梁高祖御容出保康門外新建三尸廟德安公廟南至横街西去通御街曰麥稍巷口以南太學東門水櫃街余家染店以南街東法雲寺又西去横街張駙馬宅寺南佑神觀後門相國寺萬姓交易相國寺毎月五次開放萬姓交易大三門上皆是飛禽猫犬之類珍禽竒獸無所不有第三門皆動用什物庭中設綵幙露屋義鋪賣蒲合簟席屏幃洗潄鞍轡弓劒時果脯腊之類近佛殿孟家道冠王道人蜜煎趙文秀筆及潘谷墨占定兩廊皆諸寺師姑賣繡作領抹花朶珠翠頭面生色銷金花様幞頭㡌子特髻冠子絛線之類殿後資聖門前皆書籍玩好圖畫及諸路罷任官貟土物香藥之類後廊皆日者貨術傳神之類寺三門閣上并資聖門各有金銅鑄羅漢五百尊佛牙等凡有齋供皆取㫖方開三門左右有兩缾琉璃塔寺内有智海惠林寳𣑽河沙東西塔院乃出角院舍各有住持僧官毎遇齋㑹凡飲食茶果動使器皿雖三五百分莫不咄嗟而辦大殿兩廊皆國朝名公筆跡左壁畫熾盛光佛降九矅鬼百戱右壁佛降鬼子母掲盂殿庭供獻樂部馬隊之類大殿朶廊皆壁隱樓殿人物莫非精妙寺東門街巷寺東門大街皆是幞頭腰帶書籍冠朶鋪席丁家素茶寺南即録事巷妓舘繡巷皆師姑繡作居住北即小甜水巷巷内南食店甚盛妓舘亦多向北李慶糟薑鋪直北出㬌靈宫東門前又向北曲東稅務街高頭街薑行後巷乃脂皮畫曲妓舘南北講堂巷孫殿丞藥鋪靴店出界北巷巷口宋家生藥鋪本鋪中兩壁皆李成所畫山水自㬌靈宫東門大街向東街北舊乾明寺㳂火改作五寺三監以東向南曰第三條甜水巷以東熈熈樓客店都下着數以東街南高陽正店向北入馬行向東街北曰車輅院南曰第二甜水巷以東審計院以東桐樹子韓家直抵太廟前門南往觀音院乃第一條甜水巷也太廟北入榆林巷通曹門大街不能遍數也上清宫上清宫在新宋門裏街北以西茆山下院醴泉觀在東水門裏觀音院在舊宋門後太廟南門㬌德寺在上清宫背寺前有桃花洞皆妓舘開寳寺在舊封邱門外斜街子内有二十四院惟仁玉院最盛天清寺在州北清暉橋興德院在金水門外長生宫在鹿家巷顯寧寺在炭場巷北婆臺寺在陳州門裏兠率寺在紅門道地踴佛寺在州西草場巷街南十方静因院在州西油醋巷浴室院在第三條甜水巷福田院在舊曹門外報恩寺在卸鹽巷太和宫女道士在州西洪橋子大街洞元觀女道士在班樓北瑶華宫在金水門外萬夀觀在舊酸棗門外十王宫前馬行街鋪席馬行北去舊封邱門外祅廟斜街州北瓦子新封邱門大街兩邊民尸鋪席外餘諸班直軍營相對至門約十里餘其餘坊巷院落縱横萬數莫知紀極處處擁門各有茶坊酒店勾肆飲食市井經紀之家往往只於市店旋置飲食不置家蔬北食則礬樓前李四家叚家爊物石逢巴子南食則寺橋金家九曲子周家最為屈指夜市直至三更盡纔五更又復開張如耍閙去處通曉不絶尋常四梢逺静去處夜市亦有燋酸豏猪胰胡餅和菜餅貛兒野狐肉果朩翹羹灌腸香糖果子之類冬月雖大風雪隂雨亦有夜市􅯴子薑豉抹臟紅絲水晶膾前肝臟蛤蜊螃蟹胡桃澤州餳竒豆鵝梨石榴查子榅桲糍糕團子鹽豉湯之類至三更方有提瓶賣茶者盖都人公私營幹夜深方歸也般載雜賣東亰般載車大者曰太平上有箱無盖箱如构欄而平板壁前出兩朩長二三尺許駕車人在中間兩手扶捉鞭駕之前列騾或驢二十餘前後作兩行或牛五七頭拽之車兩輪與箱齊後有兩斜朩脚拖夜中間懸一鐵鈴行即有聲使逺來者車相避仍於車後繫騾驢二頭遇下峻險橋路以鞭謕之使倒坐綞車令緩行也可載數十石官中車惟用驢差小耳其次有平頭車亦如太平車而小兩輪前出長朩作轅朩稍横一朩以獨牛在轅内項負横朩人在一邊以手牽牛鼻䋲駕之酒正店多以此載酒梢桶矣梢桶如長水桶面安靨口毎梢三斗許一貫五百文又有宅眷坐車子與平頭車大抵相似但㯶作盖及前後有构欄門垂簾又有獨輪車前後二人把駕兩旁兩人扶柺前有驢拽謂之串車以不用耳子轉輪也般載竹朩瓦石但無前轅止一人或兩人推之此車往往賣糕及餻麋之類人用不中載物也平盤兩輪謂之浪子車唯用人拽又有載巨石大朩只有短梯盤而無輪謂之癡車皆省人力也又有駞騾驢䭾子或皮或竹為之如方匾竹􅓕兩搭背上斛㪷則用布袋駞之都市錢陌都市錢陌官用七十七街市通用七十五魚肉菜七十二陌金銀七十四珠珍雇婢妮買䖝蟻六十八文字五十六陌行市各有長短使用雇覔人力凡雇覔人力幹當人酒食作匠之類各有行老供雇覔女使即有引至牙人防火毎坊巷三百歩許有軍廵鋪屋一所鋪兵五人夜間廵警及領公事又於髙處磚砌望火樓樓上有人卓望下有官屋數間屯駐軍兵百餘人及有救火家事謂如大小桶洒子麻搭斧鋸梯子火􅒎大索鐵猫兒之類毎遇有遺火去處則有馬軍奔報軍廂主馬歩軍殿前三衙開封府各領軍汲水撲滅不勞百姓天曉諸人入市毎日交五更諸寺院行者打鐵牌子或朩魚循門報曉亦各分地方日間求化諸趨朝入市之人聞此而起諸門橋市井巳開如瓠羮店門首坐一小兒呌饒骨頭間有灌肺及炒肺酒店多㸃燈燭沽賣毎分不過二十文并粥飯㸃心亦開或有賣洗面水煎㸃湯藥者直至天明其殺猪羊作坊毎人檐猪羊及車子上市動即百數如果朩亦集於朱雀門外及州橋之西謂之果子行紙畫兒亦在彼處興販不絶其賣麥麵毎秤作一布袋謂之一宛或三五秤作一宛用太平車或驢馬䭾之從城外守門入城貨賣至天明不絶更有御街州橋至南内前趂朝賣藥及飲食者吟呌百端諸色雜賣若養馬則有兩人日供切草養犬則供錫糟養猫則供猫食并小魚其錮路釘鉸篐桶修整動使掌鞋刷腰帶修幞頭帽子補洗魫角冠子日供打香印者則管定鋪席人家牌額時節即印施佛像等其供人家打水者各有地分坊巷以有使漆打釵環荷大斧斫柴換扇子柄供香餅子炭團夏月則有洗氊淘井者舉意皆在目前或軍營放停樂人動鼓樂於空閑􅈬坊巷引小兒婦女觀㸔散糖果子之類謂之賣梅子又謂之杷街毎日入宅舍宫院前則有􅈬門賣羊肉頭肚腰子白腸鶉兎魚鰕退毛鷄鴨蛤蜊螃蟹辣爊香藥果子撲賣冠梳領抹頭面衣着動使銅鐵器皿衣箱磁器之類亦有撲上件物事者謂之勘宅其後街或空閑處團葢房屋向背聚居謂之院子小民居止毎日賣蒸梨棗黄糕麋宿蒸餅發牙豆之類毎遇春時官差人夫監淘在城溝渠别坑盛淘出者泥謂之泥盆候官差人來撿視了方盖覆夜間出入月黑宜照管也東亰夢華録巻三
